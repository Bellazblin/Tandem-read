<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tandem</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FDF6EC;--card:#FFFDF8;--border:#1A1A1A;--yellow:#FFD93D;--red:#FF6B6B;--blue:#6BC5FF;--green:#6BCB77;--text:#1A1A1A;--muted:#888;--radius:14px;--shadow:4px 4px 0 var(--border)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(circle,#e8dfd3 1px,transparent 1px);background-size:20px 20px}
.screen{display:none;min-height:100vh;padding:16px;max-width:600px;margin:0 auto}
.screen.active{display:block}
.card{background:var(--card);border:3px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.btn{display:inline-block;padding:10px 24px;background:var(--yellow);color:var(--text);border:3px solid var(--border);border-radius:10px;font-family:inherit;font-weight:700;font-size:.88rem;cursor:pointer;box-shadow:3px 3px 0 var(--border);transition:all .1s}
.btn:active{box-shadow:1px 1px 0 var(--border);transform:translate(2px,2px)}
.btn-sm{padding:7px 16px;font-size:.75rem;box-shadow:2px 2px 0 var(--border)}
.btn-ghost{display:inline-block;padding:8px 18px;background:transparent;color:var(--text);border:2px solid var(--border);border-radius:8px;font-family:inherit;font-weight:600;font-size:.78rem;cursor:pointer;transition:all .15s}
.btn-ghost:hover{background:var(--border);color:var(--card)}
.input{padding:10px 14px;border:3px solid var(--border);border-radius:10px;font-family:inherit;font-size:1rem;font-weight:500;background:var(--card);outline:none;width:100%}
.input:focus{box-shadow:0 0 0 3px var(--yellow)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:700;border:2px solid var(--border)}
.tag-a1{background:#D4EDDA}.tag-a2{background:#CCE5FF}.tag-b1{background:#FFF3CD}.tag-b2{background:#F8D7DA}.tag-lang{background:var(--yellow)}
h1{font-size:1.8rem;font-weight:700}h2{font-size:1.2rem;font-weight:700}h3{font-size:.95rem;font-weight:700}
.subtitle{color:var(--muted);font-size:.78rem;font-weight:500}
.nav{display:flex;background:var(--card);border:3px solid var(--border);border-radius:30px;box-shadow:var(--shadow);padding:4px;margin-bottom:16px}
.nav-item{flex:1;text-align:center;padding:10px;border-radius:26px;font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s}
.nav-item.active{background:var(--yellow)}
.badge{display:inline-flex;align-items:center;gap:4px;background:var(--yellow);border:2px solid var(--border);border-radius:20px;padding:3px 10px;font-size:.68rem;font-weight:700}
.avatar{width:42px;height:42px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0}
.avatar-1{background:var(--red);color:#fff}.avatar-2{background:var(--blue);color:#fff}
.divider{height:2px;background:var(--border);margin:16px 0;opacity:.1}
.sentence-row{padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.sentence-row:last-child{border-bottom:none}
.s-num{font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:3px}
.s-line{font-size:1.02rem;line-height:1.9;margin-bottom:2px}
.s-hidden{background:var(--border);color:var(--border);border-radius:4px;padding:2px 0;user-select:none;font-size:1.02rem;line-height:1.9}
.s-selectable{cursor:text;user-select:text}
.marked{background:var(--yellow);border-radius:4px;padding:1px 2px;cursor:pointer}
.blank-input{border:none;border-bottom:3px solid var(--yellow);background:transparent;font-family:inherit;font-size:inherit;font-weight:600;color:var(--text);outline:none;padding:0 4px;text-align:center}
.blank-input:focus{border-bottom-color:var(--border)}
.locked-val{font-weight:700;padding:0 3px;border-bottom:3px solid var(--yellow)}
.locked-val.correct{color:#2d7a3a;border-bottom-color:var(--green)}
.locked-val.wrong{color:#c0392b;border-bottom-color:var(--red)}
.answer-hint{color:#2d7a3a;font-size:.85em;margin-left:6px;font-weight:600}
.ready-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);display:inline-block}
.ready-dot.on{background:var(--green)}
.room-card{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:2px solid rgba(0,0,0,.04)}
.room-card:last-child{border-bottom:none}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.lb-rank{width:28px;height:28px;border-radius:50%;background:var(--border);color:var(--card);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0}
.lb-rank.gold{background:var(--yellow);color:var(--text)}.lb-rank.silver{background:#C0C0C0}.lb-rank.bronze{background:#CD7F32;color:#fff}
.upload-zone{border:3px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;background:rgba(255,217,61,.05);transition:background .2s}
.upload-zone:hover{background:rgba(255,217,61,.15)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>

<!-- NICKNAME -->
<div id="s-nick" class="screen active">
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center">
<div class="card" style="max-width:360px;width:100%;text-align:center">
<div style="font-size:2.5rem;margin-bottom:8px">🗣️</div>
<h1 style="margin-bottom:4px">Tandem</h1>
<p class="subtitle" style="margin-bottom:24px">Cooperative Language Exchange</p>
<input class="input" id="inp-nick" placeholder="Your nickname" maxlength="20" onkeydown="if(event.key==='Enter')goNick()" style="text-align:center;margin-bottom:14px">
<br><button class="btn" onclick="goNick()">Let's go!</button>
</div></div></div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
<div class="nav">
<div class="nav-item active" onclick="showTab('lib')" id="tab-lib">📚 Library</div>
<div class="nav-item" onclick="showTab('rooms')" id="tab-rooms">🚪 Rooms</div>
<div class="nav-item" onclick="showTab('lb')" id="tab-lb">🏆 Board</div>
</div>
<div class="card" style="display:flex;align-items:center;gap:12px;padding:14px 16px">
<div class="avatar avatar-1" id="me-av">?</div>
<div style="flex:1"><div style="font-weight:700;font-size:.9rem" id="me-name">—</div><div class="subtitle" id="me-stat">0 sessions</div></div>
<div class="badge" id="me-stars">⭐ 0</div>
</div>
<!-- Library -->
<div id="p-lib">
<h2 style="margin-bottom:10px">📚 Exercise Library</h2>
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="filters"></div>
<div id="lib-list"></div>
<div class="upload-zone" style="margin-top:12px" onclick="document.getElementById('fup').click()" ondragover="event.preventDefault()" ondrop="event.preventDefault();dropFile(event)">
<input type="file" id="fup" accept=".txt,.tsv,.csv" style="display:none" onchange="upFile(this)">
<div style="font-size:1.2rem;margin-bottom:4px">📄</div>
<div style="font-weight:600;font-size:.82rem" id="up-lbl">Upload your own text</div>
<div class="subtitle">Plain sentence pairs, alternating lines</div>
</div>
</div>
<!-- Rooms -->
<div id="p-rooms" style="display:none">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2>🚪 Open Rooms</h2><button class="btn btn-sm" onclick="loadRooms()">Refresh</button></div>
<div class="card" id="rooms-el"><div class="subtitle" style="text-align:center;padding:20px">No open rooms</div></div>
<div class="divider"></div>
<h3 style="margin-bottom:8px">Join by code</h3>
<div style="display:flex;gap:8px"><input class="input" id="inp-code" placeholder="ABCD" maxlength="4" style="text-align:center;font-size:1.2rem;letter-spacing:.3em;font-weight:700;text-transform:uppercase;flex:1" onkeydown="if(event.key==='Enter')joinCode()"><button class="btn" onclick="joinCode()">Join</button></div>
<div class="subtitle" id="join-err" style="color:var(--red);margin-top:6px"></div>
</div>
<!-- Leaderboard -->
<div id="p-lb" style="display:none">
<h2 style="margin-bottom:12px">🏆 Leaderboard</h2>
<div class="card" id="lb-el"><div class="subtitle" style="text-align:center;padding:20px">No data yet</div></div>
</div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
<div class="card" style="padding:12px 16px">
<div style="display:flex;align-items:center;justify-content:space-between">
<div style="display:flex;align-items:center;gap:8px">
<div class="avatar avatar-1" style="width:34px;height:34px;font-size:.8rem" id="g-a1">?</div>
<div><div style="font-weight:700;font-size:.78rem" id="g-n1">—</div><div style="display:flex;align-items:center;gap:4px"><div class="ready-dot" id="g-r1"></div><span class="subtitle" id="g-s1">reading</span></div></div>
</div>
<div style="text-align:center"><div style="font-weight:700;font-size:.65rem;color:var(--muted)" id="g-code">—</div><div style="font-weight:700;font-size:.82rem" id="g-phase">📖 Reading</div></div>
<div style="display:flex;align-items:center;gap:8px;flex-direction:row-reverse">
<div class="avatar avatar-2" style="width:34px;height:34px;font-size:.8rem" id="g-a2">?</div>
<div style="text-align:right"><div style="font-weight:700;font-size:.78rem" id="g-n2">waiting...</div><div style="display:flex;align-items:center;gap:4px;justify-content:flex-end"><span class="subtitle" id="g-s2">—</span><div class="ready-dot" id="g-r2"></div></div></div>
</div>
</div>
<div style="display:flex;gap:6px;align-items:center;margin-top:8px">
<span class="tag tag-lang" id="g-lang">—</span><span class="tag" id="g-lvl">—</span><span class="subtitle" style="margin-left:4px" id="g-topic">—</span><span class="subtitle" style="margin-left:auto" id="g-prog">—</span>
</div>
</div>
<div class="card" id="g-body" style="min-height:200px"></div>
<div id="g-act" style="text-align:center;margin-top:8px"></div>
<div style="text-align:center;margin-top:12px"><button class="btn-ghost" style="font-size:.7rem" onclick="backLobby()">← Back to Lobby</button></div>
</div>

<script>
const S=io();
let me="",myP=0,rc="",lib=[],filt="all";
let sents=[],meta={},phase="";
let myMarks={},partnerMarks={};
let aIdx=0,u1V={},u2V={},u1L={},u2L={},rev={};
let n1="",n2="",r1=false,r2=false;
let allMarks={};

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showTab(t){['lib','rooms','lb'].forEach(x=>{document.getElementById('p-'+x).style.display=x===t?'block':'none';document.getElementById('tab-'+x).classList.toggle('active',x===t)});if(t==='rooms')loadRooms();if(t==='lb')loadLB()}

// NICK
function goNick(){const n=document.getElementById('inp-nick').value.trim();if(!n)return;me=n;S.emit('set-nickname',n,()=>{document.getElementById('me-name').textContent=n;document.getElementById('me-av').textContent=n[0].toUpperCase();loadLib();show('s-lobby')})}

// LIBRARY
function loadLib(){S.emit('get-library',d=>{lib=d;renderLib()})}
function renderLib(){
const el=document.getElementById('lib-list');
let items=filt==='all'?lib:lib.filter(e=>e.lang===filt||e.level===filt);
// Render filters
const fs=document.getElementById('filters');
const tags=['all','DE-ZH','FR-ZH','A1','A2','B1','B2'];
fs.innerHTML=tags.map(t=>`<button class="btn-ghost" style="padding:4px 12px;font-size:.68rem;${filt===t?'background:var(--yellow)':''}" onclick="filt='${t}';renderLib()">${t==='all'?'All':t==='DE-ZH'?'🇩🇪🇨🇳':t==='FR-ZH'?'🇫🇷🇨🇳':t}</button>`).join('');
if(!items.length){el.innerHTML='<div class="card"><div class="subtitle" style="text-align:center;padding:12px">No matches</div></div>';return}
el.innerHTML=items.map(e=>`<div class="card fade-in" style="cursor:pointer" onclick="pickEx('${e.id}')"><div style="display:flex;align-items:center;justify-content:space-between"><h3>${e.topic}</h3><div style="display:flex;gap:4px"><span class="tag tag-lang">${fl(e.lang)}</span><span class="tag tag-${e.level.toLowerCase()}">${e.level}</span></div></div><div class="subtitle" style="margin-top:4px">${e.topicZh} · ${e.count} sentences</div></div>`).join('')}
function fl(l){return{'DE-ZH':'🇩🇪⇄🇨🇳','FR-ZH':'🇫🇷⇄🇨🇳'}[l]||l}

// CREATE
function pickEx(id){S.emit('create-room',{exerciseId:id},onRoom)}
function onRoom(res){if(res.error)return alert(res.error);myP=res.player;rc=res.code;sents=res.sentences;meta=res.exerciseMeta;phase=res.phase;n1=me;n2="";r1=r2=false;myMarks={};partnerMarks={};aIdx=0;u1V={};u2V={};u1L={};u2L={};rev={};enterGame()}

// FILE
function upFile(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const p=parseF(e.target.result);if(p.length>0)S.emit('create-room',{customSentences:p},onRoom)};r.readAsText(f)}
function dropFile(e){const f=e.dataTransfer.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const p=parseF(ev.target.result);if(p.length>0)S.emit('create-room',{customSentences:p},onRoom)};r.readAsText(f)}
function parseF(t){const ls=t.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('====='));const ps=[];if(ls[0]?.includes('\t')){for(const l of ls){const p=l.split('\t');if(p.length>=2)ps.push([p[0].trim(),p[1].trim()])}}else{for(let i=0;i+1<ls.length;i+=2)ps.push([ls[i],ls[i+1]])}return ps}

// ROOMS
function loadRooms(){S.emit('get-rooms',list=>{const el=document.getElementById('rooms-el');if(!list.length){el.innerHTML='<div class="subtitle" style="text-align:center;padding:20px">No open rooms. Create one from the Library!</div>';return}el.innerHTML=list.map(r=>`<div class="room-card"><div><div style="font-weight:700;font-size:.85rem">${esc(r.creator)}'s room</div><div style="display:flex;gap:4px;margin-top:4px"><span class="tag tag-lang" style="font-size:.6rem">${fl(r.lang)}</span><span class="tag tag-${r.level.toLowerCase()}" style="font-size:.6rem">${r.level}</span><span class="subtitle" style="font-size:.65rem">${esc(r.topic)} · ${r.count}句</span></div></div><button class="btn btn-sm" onclick="joinR('${r.code}')">Join</button></div>`).join('')})}
function joinCode(){const c=document.getElementById('inp-code').value.trim().toUpperCase();if(c)joinR(c)}
function joinR(code){S.emit('join-room',code,res=>{if(res.error){document.getElementById('join-err').textContent=res.error;return}myP=res.player;rc=res.code;sents=res.sentences;meta=res.exerciseMeta;phase=res.phase;n2=me;r1=r2=false;myMarks={};partnerMarks={};aIdx=0;u1V={};u2V={};u1L={};u2L={};rev={};enterGame()})}

// LEADERBOARD
function loadLB(){S.emit('get-leaderboard',b=>{const el=document.getElementById('lb-el');if(!b.length){el.innerHTML='<div class="subtitle" style="text-align:center;padding:20px">Complete a session to appear here!</div>';return}el.innerHTML=b.map((u,i)=>`<div class="lb-row"><div class="lb-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div><div style="flex:1"><div style="font-weight:700;font-size:.85rem">${esc(u.name)}</div><div class="subtitle">${u.sessions} sessions · ${u.total} practiced</div></div><div class="badge">⭐ ${u.total}</div></div>`).join('')})}

// GAME
function enterGame(){show('s-game');updHeader();render();updAct()}
function updHeader(){
document.getElementById('g-code').textContent='Room: '+rc;
document.getElementById('g-a1').textContent=(n1||'?')[0].toUpperCase();
document.getElementById('g-n1').textContent=n1||'waiting...';
document.getElementById('g-a2').textContent=(n2||'?')[0].toUpperCase();
document.getElementById('g-n2').textContent=n2||'waiting...';
document.getElementById('g-lang').textContent=fl(meta.lang||'');
document.getElementById('g-lvl').textContent=meta.level||'';
document.getElementById('g-lvl').className='tag tag-'+(meta.level||'').toLowerCase();
document.getElementById('g-topic').textContent=(meta.topic||'')+' · '+(meta.topicZh||'');
document.getElementById('g-phase').textContent=phase==='practice'?'✏️ Practice':'📖 Reading';
document.getElementById('g-r1').className='ready-dot'+(r1?' on':'');
document.getElementById('g-r2').className='ready-dot'+(r2?' on':'');
document.getElementById('g-s1').textContent=r1?'ready':'reading';
document.getElementById('g-s2').textContent=n2?(r2?'ready':'reading'):'—';
document.getElementById('g-prog').textContent=phase==='practice'?((aIdx+1)+'/'+sents.length):(sents.length+' sentences');
}

function render(){
const el=document.getElementById('g-body');
if(phase==='reading')renderRead(el);
else renderPractice(el);
}

// === READING ===
function renderRead(el){
const myLI=myP===1?1:0; // index of my target language
const myLK=myP===1?'b':'a';
let h='';
sents.forEach((pair,i)=>{
const myText=pair[myLI],hidText=pair[1-myLI];
const marks=myMarks[i+'-'+myLK]||[];
h+=`<div class="sentence-row fade-in"><div class="s-num">${i+1}.</div>`;
h+=`<div class="s-hidden">${esc(hidText)}</div>`;
h+=`<div class="s-line s-selectable" id="st-${i}" onmouseup="onSel(${i},'${myLK}')">${markText(myText,marks,i,myLK)}</div>`;
h+=`</div>`;
});
el.innerHTML=h;
}

function markText(text,marks,si,lk){
if(!marks||!marks.length)return esc(text);
const sorted=[...marks].sort((a,b)=>a.start-b.start);
let r='',p=0;
sorted.forEach(m=>{
if(m.start>p)r+=esc(text.substring(p,m.start));
r+=`<span class="marked" onclick="event.stopPropagation();rmMark(${si},'${lk}',${m.start},${m.end})">${esc(text.substring(m.start,m.end))}</span>`;
p=m.end;
});
if(p<text.length)r+=esc(text.substring(p));
return r;
}

function onSel(si,lk){
const sel=window.getSelection();if(!sel||sel.isCollapsed)return;
const text=sents[si][lk==='a'?0:1];
const range=sel.getRangeAt(0);
const cont=document.getElementById('st-'+si);
if(!cont||!cont.contains(range.startContainer)||!cont.contains(range.endContainer)){sel.removeAllRanges();return}
const st=sel.toString().trim();if(!st){sel.removeAllRanges();return}
// Find in original text
const idx=text.indexOf(st);if(idx===-1){sel.removeAllRanges();return}
const start=idx,end=idx+st.length;
const key=si+'-'+lk;
if(!myMarks[key])myMarks[key]=[];
const overlap=myMarks[key].find(m=>!(end<=m.start||start>=m.end));
if(overlap){sel.removeAllRanges();return}
myMarks[key].push({start,end});
S.emit('mark-word',{sentenceIdx:si,lang:lk,start,end});
sel.removeAllRanges();
render();
}

function rmMark(si,lk,start,end){
const key=si+'-'+lk;
if(myMarks[key])myMarks[key]=myMarks[key].filter(m=>!(m.start===start&&m.end===end));
S.emit('unmark-word',{sentenceIdx:si,lang:lk,start,end});
render();
}

// === PRACTICE ===
function renderPractice(el){
let h='';
sents.forEach((pair,i)=>{
const isAct=i===aIdx,isPast=i<aIdx;
const aL=!!u1L[i]||!hasBlank(i,2); // line A locked (player 2 fills line A)
const bL=!!u2L[i]||!hasBlank(i,1); // wait, let me think...
// Player 1's target = langB (index 1), so player 1 fills blanks in line B
// Player 2's target = langA (index 0), so player 2 fills blanks in line A
// u1L[i] = player 1 locked sentence i (they fill line B)
// u2L[i] = player 2 locked sentence i (they fill line A)
const p1locked=!!u1L[i];
const p2locked=!!u2L[i];
const p1hasBlank=hasBlank(i,1);
const p2hasBlank=hasBlank(i,2);
const bothDone=(p1locked||!p1hasBlank)&&(p2locked||!p2hasBlank);
const isRev=!!rev[i];
const isLast=i===sents.length-1;

const op=isAct?'1':isPast?'0.35':'0.25';
const pe=isAct?'auto':'none';

h+=`<div class="sentence-row" style="opacity:${op};pointer-events:${pe}" ${isAct?'id="act-row"':''}>`;
h+=`<div class="s-num">${i+1}.</div>`;

// Line A (index 0) — Player 2 fills this
h+=pracLine(pair[0],i,'a',2,isAct,isRev);
// Line B (index 1) — Player 1 fills this
h+=pracLine(pair[1],i,'b',1,isAct,isRev);

// Buttons
if(isAct&&bothDone&&!isRev){
h+=`<div class="fade-in" style="margin-top:10px"><button class="btn btn-sm" onclick="doReveal(${i})">Reveal</button></div>`;
}
if(isAct&&isRev&&!isLast){
h+=`<div class="fade-in" style="margin-top:10px"><button class="btn btn-sm" onclick="doNext()">Next →</button></div>`;
}
if(isAct&&isRev&&isLast){
h+=`<div class="fade-in" style="margin-top:10px"><div class="subtitle" style="margin-bottom:6px">Session complete!</div><button class="btn btn-sm" onclick="doRestart()">Again</button></div>`;
}
h+=`</div>`;
});
el.innerHTML=h;
// Focus
if(phase==='practice'){
const myLK=myP===1?'b':'a';
const inp=document.getElementById('bl-'+aIdx+'-'+myLK);
if(inp&&!isMyLocked(aIdx))setTimeout(()=>inp.focus(),100);
}
// Scroll
const act=document.getElementById('act-row');
if(act)act.scrollIntoView({behavior:'smooth',block:'center'});
}

function hasBlank(sentIdx,player){
// Player 1 marks on langB, player 2 marks on langA
const lk=player===1?'b':'a';
const marks=allMarks[player]?.[sentIdx+'-'+lk];
return marks&&marks.length>0;
}

function isMyLocked(idx){return myP===1?!!u1L[idx]:!!u2L[idx]}

function pracLine(text,si,lk,whoFills,isAct,isRev){
const marks=allMarks[whoFills]?.[si+'-'+lk]||[];
if(!marks.length)return`<div class="s-line">${esc(text)}</div>`;

const sorted=[...marks].sort((a,b)=>a.start-b.start);
const vals=whoFills===1?u1V:u2V;
const locked=whoFills===1?!!u1L[si]:!!u2L[si];
const isMe=whoFills===myP;

let h='<div class="s-line">';
let p=0;
sorted.forEach((m,bi)=>{
if(m.start>p)h+=esc(text.substring(p,m.start));
const answer=text.substring(m.start,m.end);
const val=vals[si]||'';

if(locked){
  // Show what was typed
  if(isRev){
    const correct=val.trim().toLowerCase()===answer.toLowerCase();
    h+=`<span class="locked-val ${correct?'correct':'wrong'}">${esc(val||'—')}</span>`;
    if(!correct)h+=`<span class="answer-hint">(${esc(answer)})</span>`;
  } else {
    h+=`<span class="locked-val">${esc(val||'—')}</span>`;
  }
} else if(isAct&&isMe){
  h+=`<input class="blank-input" id="bl-${si}-${lk}" value="${esc(val)}" style="width:${Math.max(40,answer.length*14+10)}px" oninput="onBI(this,${si},${whoFills})" onkeydown="onBK(event,this,${si},${whoFills})">`;
} else if(isAct){
  // Partner's blank — show waiting line
  h+=`<span style="display:inline-block;width:${Math.max(40,answer.length*14+10)}px;border-bottom:3px solid ${whoFills===1?'var(--red)':'var(--blue)'};height:1.2em">&nbsp;</span>`;
} else {
  h+='______';
}
p=m.end;
});
if(p<text.length)h+=esc(text.substring(p));
h+='</div>';
return h;
}

function onBI(inp,si,who){
if(who===1)u1V[si]=inp.value;
else u2V[si]=inp.value;
}

function onBK(e,inp,si,who){
if(e.key==='Enter'&&inp.value.trim()){
if(who===1){u1V[si]=inp.value.trim();u1L[si]=true;}
else{u2V[si]=inp.value.trim();u2L[si]=true;}
S.emit('lock',{idx:si,value:inp.value.trim()});
render();updHeader();
}
}

function doReveal(i){S.emit('reveal',{idx:i})}
function doNext(){S.emit('next')}
function doRestart(){S.emit('restart')}
function backLobby(){show('s-lobby');loadLib()}

// ACTIONS (reading phase)
function updAct(){
const el=document.getElementById('g-act');
if(phase==='reading'){
const iReady=myP===1?r1:r2;
const both=r1&&r2&&n2;
el.innerHTML=`${!iReady?`<button class="btn" onclick="setReady()">✓ I'm Ready</button>`:`<span class="badge" style="font-size:.8rem">✓ You're ready</span>`}${both?`<br><button class="btn" style="margin-top:8px" onclick="startPrac()">🚀 Start Practice!</button>`:''}`;
}else{el.innerHTML=''}
}
function setReady(){S.emit('set-ready');if(myP===1)r1=true;else r2=true;updAct();updHeader()}
function startPrac(){S.emit('start-practice')}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// === SOCKET EVENTS ===
S.on('player-joined',d=>{n1=d.p1||n1;n2=d.p2||n2;updHeader();updAct()});
S.on('player-left',d=>{if(d.player===1)n1='';else n2='';updHeader()});
S.on('word-marked',d=>{if(d.player!==myP){const k=d.sentenceIdx+'-'+d.lang;if(!partnerMarks[k])partnerMarks[k]=[];partnerMarks[k].push({start:d.start,end:d.end})}});
S.on('word-unmarked',d=>{if(d.player!==myP){const k=d.sentenceIdx+'-'+d.lang;if(partnerMarks[k])partnerMarks[k]=partnerMarks[k].filter(m=>!(m.start===d.start&&m.end===d.end))}});
S.on('player-ready',d=>{r1=d.p1Ready;r2=d.p2Ready;updHeader();updAct()});
S.on('practice-started',d=>{
phase='practice';sents=d.sentences;aIdx=d.activeIdx;
u1V={};u2V={};u1L={};u2L={};rev={};
allMarks=d.allMarks;
updHeader();render();updAct();
});
S.on('player-locked',d=>{u1L=d.u1Locked;u2L=d.u2Locked;u1V=d.u1Val;u2V=d.u2Val;render()});
S.on('revealed',d=>{rev=d.revealed;render()});
S.on('advance',d=>{aIdx=d.activeIdx;updHeader();render()});
S.on('restarted',d=>{
phase='reading';sents=d.sentences;meta=d.exerciseMeta;
aIdx=0;myMarks={};partnerMarks={};r1=r2=false;
u1V={};u2V={};u1L={};u2L={};rev={};allMarks={};
updHeader();render();updAct();
});
</script>
</body>
</html>
