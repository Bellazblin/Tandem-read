<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tandem</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FDF6EC;
  --card: #FFFDF8;
  --border: #1A1A1A;
  --yellow: #FFD93D;
  --yellow-dark: #E6C035;
  --red: #FF6B6B;
  --blue: #6BC5FF;
  --green: #6BCB77;
  --text: #1A1A1A;
  --text-light: #888;
  --radius: 14px;
  --shadow: 4px 4px 0 var(--border);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: radial-gradient(circle, #e8dfd3 1px, transparent 1px);
  background-size: 20px 20px;
}
.screen { display: none; min-height: 100vh; padding: 16px; max-width: 600px; margin: 0 auto; }
.screen.active { display: block; }
.card {
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 16px;
}
.btn {
  display: inline-block;
  padding: 10px 24px;
  background: var(--yellow);
  color: var(--text);
  border: 3px solid var(--border);
  border-radius: 10px;
  font-family: inherit;
  font-weight: 700;
  font-size: 0.88rem;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--border);
  transition: all 0.1s;
  text-decoration: none;
}
.btn:active { box-shadow: 1px 1px 0 var(--border); transform: translate(2px,2px); }
.btn-ghost {
  display: inline-block;
  padding: 8px 18px;
  background: transparent;
  color: var(--text);
  border: 2px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost:hover { background: var(--border); color: var(--card); }
.btn-small { padding: 6px 14px; font-size: 0.72rem; box-shadow: 2px 2px 0 var(--border); }
.input {
  padding: 10px 14px;
  border: 3px solid var(--border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 500;
  background: var(--card);
  outline: none;
  width: 100%;
}
.input:focus { box-shadow: 0 0 0 3px var(--yellow); }
.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.65rem;
  font-weight: 700;
  border: 2px solid var(--border);
}
.tag-a1 { background: #D4EDDA; }
.tag-a2 { background: #CCE5FF; }
.tag-b1 { background: #FFF3CD; }
.tag-b2 { background: #F8D7DA; }
.tag-lang { background: var(--yellow); }
h1 { font-size: 1.8rem; font-weight: 700; }
h2 { font-size: 1.2rem; font-weight: 700; }
h3 { font-size: 0.95rem; font-weight: 700; }
.subtitle { color: var(--text-light); font-size: 0.78rem; font-weight: 500; }
.nav {
  display: flex;
  background: var(--card);
  border: 3px solid var(--border);
  border-radius: 30px;
  box-shadow: var(--shadow);
  padding: 4px;
  margin-bottom: 16px;
}
.nav-item {
  flex: 1; text-align: center; padding: 10px; border-radius: 26px;
  font-weight: 700; font-size: 0.78rem; cursor: pointer;
  transition: all 0.2s;
}
.nav-item.active { background: var(--yellow); }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--yellow); border: 2px solid var(--border);
  border-radius: 20px; padding: 3px 10px;
  font-size: 0.68rem; font-weight: 700;
}
.avatar {
  width: 42px; height: 42px; border-radius: 50%;
  border: 3px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1rem;
  flex-shrink: 0;
}
.avatar-1 { background: var(--red); color: #fff; }
.avatar-2 { background: var(--blue); color: #fff; }
.divider { height: 2px; background: var(--border); margin: 16px 0; opacity: 0.1; }

/* Reading mode */
.sentence-reading {
  padding: 14px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.sentence-reading:last-child { border-bottom: none; }
.sentence-text {
  font-size: 1rem; line-height: 1.9;
  cursor: default; user-select: none;
}
.sentence-text.selectable { cursor: text; user-select: text; }
.sentence-hidden {
  background: var(--border); color: var(--border);
  border-radius: 4px; padding: 2px 0;
  user-select: none; cursor: default;
  font-size: 1rem; line-height: 1.9;
}
.marked-word {
  background: var(--yellow);
  border-radius: 4px;
  padding: 1px 2px;
  cursor: pointer;
}
.sentence-num {
  font-size: 0.7rem; font-weight: 700;
  color: var(--text-light); margin-bottom: 2px;
}

/* Practice mode */
.practice-blank {
  border: none; border-bottom: 3px solid var(--yellow);
  background: transparent; font-family: inherit;
  font-size: inherit; font-weight: 600; color: var(--text);
  outline: none; padding: 0 4px; text-align: center;
}
.practice-blank:focus { border-bottom-color: var(--border); }
.locked-word { font-weight: 700; padding: 0 2px; border-radius: 4px; }
.locked-word.correct { background: rgba(107,203,119,0.2); color: #2d7a3a; }
.locked-word.wrong { background: rgba(255,107,107,0.2); color: #c0392b; }
.correct-answer { color: #2d7a3a; font-size: 0.85em; margin-left: 6px; }

/* Leaderboard */
.lb-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.lb-rank {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--border); color: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.75rem; flex-shrink: 0;
}
.lb-rank.gold { background: var(--yellow); color: var(--text); }
.lb-rank.silver { background: #C0C0C0; }
.lb-rank.bronze { background: #CD7F32; color: #fff; }

/* Game layout */
.game-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.player-bar {
  display: flex; align-items: center; gap: 8px;
}

/* Room list */
.room-card {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
  border-bottom: 2px solid rgba(0,0,0,0.04);
}
.room-card:last-child { border-bottom: none; }

@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease; }

/* Upload area */
.upload-zone {
  border: 3px dashed var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  background: rgba(255,217,61,0.05);
  transition: background 0.2s;
}
.upload-zone:hover { background: rgba(255,217,61,0.15); }

/* Ready indicator */
.ready-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); }
.ready-dot.on { background: var(--green); }

/* Responsive */
@media (max-width: 480px) {
  .screen { padding: 10px; }
  h1 { font-size: 1.4rem; }
}
</style>
</head>
<body>

<!-- ===== SCREEN: NICKNAME ===== -->
<div id="s-nickname" class="screen active">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <div class="card" style="max-width:360px;width:100%;text-align:center;">
      <div style="font-size:2.5rem;margin-bottom:8px;">🗣️</div>
      <h1 style="margin-bottom:4px;">Tandem</h1>
      <p class="subtitle" style="margin-bottom:24px;">Cooperative Language Exchange</p>
      <input class="input" id="nickname-input" placeholder="Your nickname" maxlength="20"
        onkeydown="if(event.key==='Enter')setNickname()" style="text-align:center;margin-bottom:14px;">
      <br>
      <button class="btn" onclick="setNickname()">Let's go!</button>
    </div>
  </div>
</div>

<!-- ===== SCREEN: LOBBY ===== -->
<div id="s-lobby" class="screen">
  <!-- Nav -->
  <div class="nav">
    <div class="nav-item active" onclick="showTab('library')" id="tab-library">📚 Library</div>
    <div class="nav-item" onclick="showTab('rooms')" id="tab-rooms">🚪 Rooms</div>
    <div class="nav-item" onclick="showTab('leaderboard')" id="tab-leaderboard">🏆 Board</div>
  </div>

  <!-- User bar -->
  <div class="card" style="display:flex;align-items:center;gap:12px;padding:14px 16px;">
    <div class="avatar avatar-1" id="my-avatar">?</div>
    <div style="flex:1;">
      <div style="font-weight:700;font-size:0.9rem;" id="my-name">—</div>
      <div class="subtitle" id="my-stats">0 sessions</div>
    </div>
    <div class="badge" id="my-stars">⭐ 0 Stars</div>
  </div>

  <!-- TAB: Library -->
  <div id="panel-library">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h2>📚 Exercise Library</h2>
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
      <button class="btn-ghost btn-small" onclick="filterLib('all')" id="f-all" style="background:var(--yellow);">All</button>
      <button class="btn-ghost btn-small" onclick="filterLib('DE-ZH')" id="f-DE-ZH">🇩🇪🇨🇳</button>
      <button class="btn-ghost btn-small" onclick="filterLib('FR-ZH')" id="f-FR-ZH">🇫🇷🇨🇳</button>
      <button class="btn-ghost btn-small" onclick="filterLib('A1')" id="f-A1">A1</button>
      <button class="btn-ghost btn-small" onclick="filterLib('A2')" id="f-A2">A2</button>
      <button class="btn-ghost btn-small" onclick="filterLib('B1')" id="f-B1">B1</button>
      <button class="btn-ghost btn-small" onclick="filterLib('B2')" id="f-B2">B2</button>
    </div>

    <div id="library-list"></div>

    <!-- Upload custom -->
    <div class="upload-zone" style="margin-top:12px;" onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault()" ondrop="event.preventDefault();handleFileDrop(event)">
      <input type="file" id="file-input" accept=".txt,.tsv,.csv" style="display:none" onchange="handleFileUpload(this)">
      <div style="font-size:1.2rem;margin-bottom:4px;">📄</div>
      <div style="font-weight:600;font-size:0.82rem;" id="upload-label">Upload your own text</div>
      <div class="subtitle">Plain sentence pairs, alternating lines</div>
    </div>
  </div>

  <!-- TAB: Rooms -->
  <div id="panel-rooms" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h2>🚪 Open Rooms</h2>
      <button class="btn btn-small" onclick="refreshRooms()">Refresh</button>
    </div>
    <div id="rooms-list" class="card">
      <div class="subtitle" style="text-align:center;padding:20px;">No open rooms yet</div>
    </div>

    <div class="divider"></div>
    <h3 style="margin-bottom:8px;">Join by code</h3>
    <div style="display:flex;gap:8px;">
      <input class="input" id="join-code" placeholder="ABCD" maxlength="4"
        style="text-align:center;font-size:1.2rem;letter-spacing:0.3em;font-weight:700;text-transform:uppercase;flex:1;"
        onkeydown="if(event.key==='Enter')joinByCode()">
      <button class="btn" onclick="joinByCode()">Join</button>
    </div>
    <div class="subtitle" id="join-error" style="color:var(--red);margin-top:6px;"></div>
  </div>

  <!-- TAB: Leaderboard -->
  <div id="panel-leaderboard" style="display:none;">
    <h2 style="margin-bottom:12px;">🏆 Leaderboard</h2>
    <div class="card" id="leaderboard-content">
      <div class="subtitle" style="text-align:center;padding:20px;">No data yet</div>
    </div>
  </div>
</div>

<!-- ===== SCREEN: GAME ===== -->
<div id="s-game" class="screen">
  <!-- Header -->
  <div class="card" style="padding:12px 16px;">
    <div class="game-header">
      <div class="player-bar">
        <div class="avatar avatar-1" style="width:36px;height:36px;font-size:0.8rem;" id="g-p1-av">?</div>
        <div>
          <div style="font-weight:700;font-size:0.78rem;" id="g-p1-name">—</div>
          <div style="display:flex;align-items:center;gap:4px;">
            <div class="ready-dot" id="g-p1-ready"></div>
            <span class="subtitle" id="g-p1-status">reading</span>
          </div>
        </div>
      </div>
      <div style="text-align:center;">
        <div style="font-weight:700;font-size:0.7rem;color:var(--text-light);" id="g-room-code">—</div>
        <div style="font-weight:700;font-size:0.82rem;" id="g-phase-label">Reading</div>
      </div>
      <div class="player-bar" style="flex-direction:row-reverse;">
        <div class="avatar avatar-2" style="width:36px;height:36px;font-size:0.8rem;" id="g-p2-av">?</div>
        <div style="text-align:right;">
          <div style="font-weight:700;font-size:0.78rem;" id="g-p2-name">waiting...</div>
          <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;">
            <span class="subtitle" id="g-p2-status">—</span>
            <div class="ready-dot" id="g-p2-ready"></div>
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:8px;">
      <span class="tag tag-lang" id="g-lang">—</span>
      <span class="tag" id="g-level">—</span>
      <span class="subtitle" id="g-topic" style="margin-left:4px;">—</span>
      <span class="subtitle" style="margin-left:auto;" id="g-progress">—</span>
    </div>
  </div>

  <!-- Sentences area -->
  <div class="card" id="g-sentences" style="min-height:200px;"></div>

  <!-- Action bar -->
  <div id="g-actions" style="text-align:center;margin-top:8px;"></div>

  <!-- Back -->
  <div style="text-align:center;margin-top:12px;">
    <button class="btn-ghost btn-small" onclick="backToLobby()">← Back to Lobby</button>
  </div>
</div>

<script>
// ============ STATE ============
const socket = io();
let myNickname = "";
let myPlayer = 0;
let roomCode = "";
let library = [];
let currentFilter = "all";
let sentences = [];
let exerciseMeta = {};
let phase = ""; // reading, practice
let myMarks = {}; // { "0-a": [{start,end}], "0-b": [...] }
let partnerMarks = {};
let activeIdx = 0;
let u1Val = {}, u2Val = {}, u1Locked = {}, u2Locked = {}, revealed = {};
let p1Name = "", p2Name = "";
let p1Ready = false, p2Ready = false;
let customSentences = null;

// ============ SCREENS ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============ NICKNAME ============
function setNickname() {
  const name = document.getElementById('nickname-input').value.trim();
  if (!name) return;
  myNickname = name;
  socket.emit('set-nickname', name, () => {
    document.getElementById('my-name').textContent = name;
    document.getElementById('my-avatar').textContent = name[0].toUpperCase();
    loadLibrary();
    showScreen('s-lobby');
  });
}

// ============ TABS ============
function showTab(tab) {
  ['library','rooms','leaderboard'].forEach(t => {
    document.getElementById('panel-'+t).style.display = t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if (tab === 'rooms') refreshRooms();
  if (tab === 'leaderboard') refreshLeaderboard();
}

// ============ LIBRARY ============
function loadLibrary() {
  socket.emit('get-library', (data) => {
    library = data;
    renderLibrary();
  });
}

function filterLib(f) {
  currentFilter = f;
  document.querySelectorAll('[id^="f-"]').forEach(b => b.style.background = 'transparent');
  document.getElementById('f-'+f).style.background = 'var(--yellow)';
  renderLibrary();
}

function renderLibrary() {
  const el = document.getElementById('library-list');
  let items = library;
  if (currentFilter !== 'all') {
    items = items.filter(e => e.lang === currentFilter || e.level === currentFilter);
  }
  if (items.length === 0) {
    el.innerHTML = '<div class="card"><div class="subtitle" style="text-align:center;padding:12px;">No exercises match this filter</div></div>';
    return;
  }
  el.innerHTML = items.map(e => `
    <div class="card fade-in" style="cursor:pointer;" onclick="selectExercise('${e.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h3>${e.topic}</h3>
        <div style="display:flex;gap:4px;">
          <span class="tag tag-lang">${langFlag(e.lang)}</span>
          <span class="tag tag-${e.level.toLowerCase()}">${e.level}</span>
        </div>
      </div>
      <div class="subtitle" style="margin-top:4px;">${e.topicZh} · ${e.count} sentences</div>
    </div>
  `).join('');
}

function langFlag(lang) {
  const map = { 'DE-ZH': '🇩🇪⇄🇨🇳', 'FR-ZH': '🇫🇷⇄🇨🇳' };
  return map[lang] || lang;
}

// ============ SELECT & CREATE ROOM ============
function selectExercise(id) {
  socket.emit('create-room', { exerciseId: id }, handleRoomCreated);
}

function handleRoomCreated(res) {
  if (res.error) return alert(res.error);
  myPlayer = res.player;
  roomCode = res.code;
  sentences = res.sentences;
  exerciseMeta = res.exerciseMeta;
  phase = res.phase;
  p1Name = myNickname;
  p2Name = "";
  p1Ready = false; p2Ready = false;
  myMarks = {}; partnerMarks = {};
  enterGame();
}

// ============ FILE UPLOAD ============
function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const pairs = parseFileText(e.target.result);
    if (pairs.length > 0) {
      socket.emit('create-room', { customSentences: pairs }, handleRoomCreated);
    }
  };
  reader.readAsText(file);
}

function handleFileDrop(e) {
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const pairs = parseFileText(ev.target.result);
    if (pairs.length > 0) {
      socket.emit('create-room', { customSentences: pairs }, handleRoomCreated);
    }
  };
  reader.readAsText(file);
}

function parseFileText(text) {
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l.length>0 && !l.startsWith('====='));
  const pairs = [];
  if (lines[0]?.includes('\t')) {
    for (const l of lines) { const p=l.split('\t'); if(p.length>=2) pairs.push([p[0].trim(),p[1].trim()]); }
  } else {
    for (let i=0;i+1<lines.length;i+=2) pairs.push([lines[i],lines[i+1]]);
  }
  return pairs;
}

// ============ ROOMS ============
function refreshRooms() {
  socket.emit('get-rooms', (list) => {
    const el = document.getElementById('rooms-list');
    if (list.length === 0) {
      el.innerHTML = '<div class="subtitle" style="text-align:center;padding:20px;">No open rooms. Create one from the Library!</div>';
      return;
    }
    el.innerHTML = list.map(r => `
      <div class="room-card">
        <div>
          <div style="font-weight:700;font-size:0.85rem;">${r.creator}'s room</div>
          <div style="display:flex;gap:4px;margin-top:4px;">
            <span class="tag tag-lang" style="font-size:0.6rem;">${langFlag(r.lang)}</span>
            <span class="tag tag-${r.level.toLowerCase()}" style="font-size:0.6rem;">${r.level}</span>
            <span class="subtitle" style="font-size:0.65rem;">${r.topic} · ${r.count}句</span>
          </div>
        </div>
        <button class="btn btn-small" onclick="joinRoom('${r.code}')">Join</button>
      </div>
    `).join('');
  });
}

function joinByCode() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code) return;
  joinRoom(code);
}

function joinRoom(code) {
  socket.emit('join-room', code, (res) => {
    if (res.error) { document.getElementById('join-error').textContent = res.error; return; }
    myPlayer = res.player;
    roomCode = res.code;
    sentences = res.sentences;
    exerciseMeta = res.exerciseMeta;
    phase = res.phase;
    p2Name = myNickname;
    p1Ready = false; p2Ready = false;
    myMarks = {}; partnerMarks = {};
    enterGame();
  });
}

// ============ LEADERBOARD ============
function refreshLeaderboard() {
  socket.emit('get-leaderboard', (board) => {
    const el = document.getElementById('leaderboard-content');
    if (board.length === 0) {
      el.innerHTML = '<div class="subtitle" style="text-align:center;padding:20px;">Complete a session to appear here!</div>';
      return;
    }
    el.innerHTML = board.map((u, i) => {
      const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      return `<div class="lb-row">
        <div class="lb-rank ${rankClass}">${i+1}</div>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:0.85rem;">${u.name}</div>
          <div class="subtitle">${u.sessions} sessions · ${u.total} words practiced</div>
        </div>
        <div class="badge">⭐ ${u.total}</div>
      </div>`;
    }).join('');
  });
}

// ============ ENTER GAME ============
function enterGame() {
  showScreen('s-game');
  updateGameHeader();
  renderSentences();
  renderActions();
}

function updateGameHeader() {
  document.getElementById('g-room-code').textContent = 'Room: ' + roomCode;
  document.getElementById('g-p1-av').textContent = (p1Name||'?')[0].toUpperCase();
  document.getElementById('g-p1-name').textContent = p1Name || 'waiting...';
  document.getElementById('g-p2-av').textContent = (p2Name||'?')[0].toUpperCase();
  document.getElementById('g-p2-name').textContent = p2Name || 'waiting...';
  document.getElementById('g-lang').textContent = langFlag(exerciseMeta.lang||'');
  document.getElementById('g-level').textContent = exerciseMeta.level||'';
  document.getElementById('g-level').className = 'tag tag-'+(exerciseMeta.level||'').toLowerCase();
  document.getElementById('g-topic').textContent = (exerciseMeta.topic||'') + ' · ' + (exerciseMeta.topicZh||'');
  document.getElementById('g-phase-label').textContent = phase === 'practice' ? '✏️ Practice' : '📖 Reading';
  document.getElementById('g-p1-ready').className = 'ready-dot' + (p1Ready?' on':'');
  document.getElementById('g-p2-ready').className = 'ready-dot' + (p2Ready?' on':'');
  document.getElementById('g-p1-status').textContent = p1Ready?'ready':'reading';
  document.getElementById('g-p2-status').textContent = p2Name?(p2Ready?'ready':'reading'):'—';
  document.getElementById('g-progress').textContent = phase==='practice'?((activeIdx+1)+'/'+sentences.length):(sentences.length+' sentences');
}

// ============ RENDER: READING MODE ============
function renderSentences() {
  const el = document.getElementById('g-sentences');
  if (phase === 'reading') {
    renderReadingMode(el);
  } else {
    renderPracticeMode(el);
  }
}

function renderReadingMode(el) {
  // Each user sees their TARGET language visible, partner's target hidden
  // Player 1 sees langB (index 1) visible, langA (index 0) hidden
  // Player 2 sees langA (index 0) visible, langB (index 1) hidden
  // Users mark words on the visible (target) language
  const myLangIdx = myPlayer === 1 ? 1 : 0; // which language index I see
  const myLangKey = myPlayer === 1 ? 'b' : 'a';

  let html = '';
  sentences.forEach((pair, i) => {
    const myText = pair[myLangIdx];
    const hiddenText = pair[1 - myLangIdx];
    const marks = myMarks[i + '-' + myLangKey] || [];

    html += `<div class="sentence-reading fade-in">`;
    html += `<div class="sentence-num">${i+1}.</div>`;

    // Hidden line
    html += `<div class="sentence-hidden">${hiddenText}</div>`;

    // Visible line — with marked words highlighted
    html += `<div class="sentence-text selectable" id="sent-${i}" onmouseup="handleSelection(${i},'${myLangKey}')">${renderMarkedText(myText, marks, i, myLangKey)}</div>`;

    html += `</div>`;
  });
  el.innerHTML = html;
}

function renderMarkedText(text, marks, sentIdx, langKey) {
  if (!marks || marks.length === 0) return escHtml(text);

  // Sort marks by start position
  const sorted = [...marks].sort((a,b) => a.start - b.start);
  let result = '';
  let pos = 0;
  sorted.forEach(m => {
    if (m.start > pos) result += escHtml(text.substring(pos, m.start));
    const word = text.substring(m.start, m.end);
    result += `<span class="marked-word" onclick="event.stopPropagation();removeMarkAt(${sentIdx},'${langKey}',${m.start},${m.end})">${escHtml(word)}</span>`;
    pos = m.end;
  });
  if (pos < text.length) result += escHtml(text.substring(pos));
  return result;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function handleSelection(sentIdx, langKey) {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const text = sentences[sentIdx][langKey === 'a' ? 0 : 1];

  // Get the selected range relative to the sentence text
  const range = sel.getRangeAt(0);
  const container = document.getElementById('sent-' + sentIdx);
  if (!container.contains(range.startContainer) || !container.contains(range.endContainer)) return;

  const selectedText = sel.toString().trim();
  if (!selectedText || selectedText.length === 0) return;

  // Find position in original text
  const start = text.indexOf(selectedText);
  if (start === -1) { sel.removeAllRanges(); return; }
  const end = start + selectedText.length;

  // Check overlap with existing marks
  const key = sentIdx + '-' + langKey;
  if (!myMarks[key]) myMarks[key] = [];
  const overlap = myMarks[key].find(m => !(end <= m.start || start >= m.end));
  if (overlap) { sel.removeAllRanges(); return; }

  myMarks[key].push({ start, end });
  socket.emit('mark-word', { sentenceIdx: sentIdx, lang: langKey, start, end });
  sel.removeAllRanges();
  renderSentences();
}

function removeMarkAt(sentIdx, langKey, start, end) {
  const key = sentIdx + '-' + langKey;
  if (myMarks[key]) {
    myMarks[key] = myMarks[key].filter(m => !(m.start === start && m.end === end));
  }
  socket.emit('unmark-word', { sentenceIdx: sentIdx, lang: langKey, start, end });
  renderSentences();
}

// ============ RENDER: PRACTICE MODE ============
function renderPracticeMode(el) {
  let html = '';
  // allMarks contains marks from both players
  // We need to render each sentence with blanks where marks are
  sentences.forEach((pair, i) => {
    const isActive = i === activeIdx;
    const isPast = i < activeIdx;
    const isFuture = i > activeIdx;
    const bothLocked = isLocked(i, 1) && isLocked(i, 2);
    const isRev = !!revealed[i];
    const isLast = i === sentences.length - 1;

    const opacity = isActive ? '1' : isPast ? '0.35' : '0.25';
    const pointer = isActive ? 'auto' : 'none';

    html += `<div class="sentence-reading" style="opacity:${opacity};pointer-events:${pointer};" ${isActive?'id="active-sent"':''}>`;
    html += `<div class="sentence-num">${i+1}.</div>`;

    // Line A — Player 2's target (Player 2 fills blanks here)
    html += renderPracticeLine(pair[0], i, 'a', 2, isActive, isRev);
    // Line B — Player 1's target (Player 1 fills blanks here)
    html += renderPracticeLine(pair[1], i, 'b', 1, isActive, isRev);

    // Actions
    if (isActive && bothLocked && !isRev) {
      html += `<div class="fade-in" style="margin-top:8px;"><button class="btn btn-small" onclick="doReveal(${i})">Reveal</button></div>`;
    }
    if (isActive && isRev && !isLast) {
      html += `<div class="fade-in" style="margin-top:8px;"><button class="btn btn-small" onclick="doNext()">Next →</button></div>`;
    }
    if (isActive && isRev && isLast) {
      html += `<div class="fade-in" style="margin-top:8px;"><div class="subtitle" style="margin-bottom:6px;">Session complete!</div><button class="btn btn-small" onclick="doRestart()">Again</button></div>`;
    }

    html += `</div>`;
  });
  el.innerHTML = html;

  // Focus input
  if (phase === 'practice') {
    const myInput = document.getElementById('blank-' + activeIdx + '-' + (myPlayer===1?'b':'a'));
    if (myInput && !isLocked(activeIdx, myPlayer)) setTimeout(()=>myInput.focus(), 100);
  }
}

function renderPracticeLine(text, sentIdx, langKey, whoFills, isActive, isRev) {
  // Get marks for this line (from the player who marked it)
  const markerPlayer = whoFills; // Player who fills = player who marked this as their target
  const allM = window._allMarks || {};
  const marks = allM[markerPlayer]?.[sentIdx + '-' + langKey] || [];

  if (marks.length === 0) {
    // No blanks — just show text
    return `<div class="sentence-text">${escHtml(text)}</div>`;
  }

  const vals = whoFills === 1 ? u1Val : u2Val;
  const locks = whoFills === 1 ? u1Locked : u2Locked;
  const locked = !!locks[sentIdx];
  const isMe = whoFills === myPlayer;

  const sorted = [...marks].sort((a,b) => a.start - b.start);
  let html = '<div class="sentence-text">';
  let pos = 0;
  let blankIdx = 0;

  sorted.forEach(m => {
    if (m.start > pos) html += escHtml(text.substring(pos, m.start));
    const answer = text.substring(m.start, m.end);
    const bKey = sentIdx + '-' + blankIdx;
    const val = (vals[bKey] || '');

    if (locked) {
      const correct = isRev && val.trim().toLowerCase() === answer.toLowerCase();
      const wrong = isRev && !correct;
      html += `<span class="locked-word ${isRev?(correct?'correct':'wrong'):''}">${escHtml(val||'—')}</span>`;
      if (wrong) html += `<span class="correct-answer">(${escHtml(answer)})</span>`;
    } else if (isActive && isMe) {
      html += `<input class="practice-blank" id="blank-${sentIdx}-${langKey}" data-sent="${sentIdx}" data-bidx="${blankIdx}" data-who="${whoFills}"
        value="${escHtml(val)}" style="width:${Math.max(40,answer.length*14+10)}px;"
        oninput="onBlankInput(this)" onkeydown="onBlankKey(event,this)">`;
    } else if (isActive) {
      html += `<span style="display:inline-block;width:${Math.max(40,answer.length*14+10)}px;border-bottom:3px solid ${whoFills===1?'var(--red)':'var(--blue)'};height:1.2em;">&nbsp;</span>`;
    } else {
      html += '______';
    }
    pos = m.end;
    blankIdx++;
  });
  if (pos < text.length) html += escHtml(text.substring(pos));
  html += '</div>';
  return html;
}

function isLocked(idx, player) {
  // Check if all blanks for this player at this sentence are locked
  return player === 1 ? !!u1Locked[idx] : !!u2Locked[idx];
}

function onBlankInput(input) {
  const sentIdx = parseInt(input.dataset.sent);
  const blankIdx = parseInt(input.dataset.bidx);
  const key = sentIdx + '-' + blankIdx;
  if (myPlayer === 1) u1Val[key] = input.value;
  else u2Val[key] = input.value;
}

function onBlankKey(e, input) {
  if (e.key === 'Enter' && input.value.trim()) {
    const sentIdx = parseInt(input.dataset.sent);
    // Collect all blank values for this sentence
    const val = input.value.trim();
    const key = sentIdx + '-' + parseInt(input.dataset.bidx);
    if (myPlayer === 1) u1Val[key] = val;
    else u2Val[key] = val;

    // Lock
    if (myPlayer === 1) u1Locked[sentIdx] = true;
    else u2Locked[sentIdx] = true;

    socket.emit('lock', { idx: sentIdx, value: val });
    renderSentences();
    updateGameHeader();
  }
}

// ============ ACTIONS ============
function renderActions() {
  const el = document.getElementById('g-actions');
  if (phase === 'reading') {
    const iReady = myPlayer === 1 ? p1Ready : p2Ready;
    const bothReady = p1Ready && p2Ready && p2Name;
    el.innerHTML = `
      ${!iReady ? `<button class="btn" onclick="setReady()">✓ I'm Ready</button>` : `<span class="badge" style="font-size:0.8rem;">✓ You're ready</span>`}
      ${bothReady ? `<br><button class="btn" style="margin-top:8px;" onclick="startPractice()">🚀 Start Practice!</button>` : ''}
    `;
  } else {
    el.innerHTML = '';
  }
}

function setReady() {
  socket.emit('set-ready');
  if (myPlayer === 1) p1Ready = true;
  else p2Ready = true;
  renderActions();
  updateGameHeader();
}

function startPractice() {
  socket.emit('start-practice');
}

function doReveal(idx) { socket.emit('reveal', { idx }); }
function doNext() { socket.emit('next'); }
function doRestart() { socket.emit('restart'); }

function backToLobby() {
  showScreen('s-lobby');
  loadLibrary();
}

// ============ SOCKET EVENTS ============
socket.on('player-joined', (data) => {
  p1Name = data.p1 || p1Name;
  p2Name = data.p2 || p2Name;
  updateGameHeader();
  renderActions();
});

socket.on('player-left', (data) => {
  if (data.player === 1) p1Name = '';
  else p2Name = '';
  updateGameHeader();
});

socket.on('word-marked', (data) => {
  if (data.player !== myPlayer) {
    // Partner marked something
    const key = data.sentenceIdx + '-' + data.lang;
    if (!partnerMarks[key]) partnerMarks[key] = [];
    partnerMarks[key].push({ start: data.start, end: data.end });
  }
});

socket.on('word-unmarked', (data) => {
  if (data.player !== myPlayer) {
    const key = data.sentenceIdx + '-' + data.lang;
    if (partnerMarks[key]) {
      partnerMarks[key] = partnerMarks[key].filter(m => !(m.start === data.start && m.end === data.end));
    }
  }
});

socket.on('player-ready', (data) => {
  p1Ready = data.p1Ready;
  p2Ready = data.p2Ready;
  updateGameHeader();
  renderActions();
});

socket.on('practice-started', (data) => {
  phase = 'practice';
  sentences = data.sentences;
  activeIdx = data.activeIdx;
  u1Val = {}; u2Val = {};
  u1Locked = {}; u2Locked = {};
  revealed = {};

  // Store marks globally for practice rendering
  window._allMarks = data.allMarks;

  updateGameHeader();
  renderSentences();
  renderActions();
});

socket.on('player-locked', (data) => {
  u1Locked = data.u1Locked;
  u2Locked = data.u2Locked;
  u1Val = data.u1Val;
  u2Val = data.u2Val;
  renderSentences();
});

socket.on('revealed', (data) => {
  revealed = data.revealed;
  renderSentences();
});

socket.on('advance', (data) => {
  activeIdx = data.activeIdx;
  updateGameHeader();
  renderSentences();
});

socket.on('restarted', (data) => {
  phase = 'reading';
  sentences = data.sentences;
  exerciseMeta = data.exerciseMeta;
  activeIdx = 0;
  myMarks = {}; partnerMarks = {};
  p1Ready = false; p2Ready = false;
  u1Val = {}; u2Val = {};
  u1Locked = {}; u2Locked = {};
  revealed = {};
  updateGameHeader();
  renderSentences();
  renderActions();
});
</script>
